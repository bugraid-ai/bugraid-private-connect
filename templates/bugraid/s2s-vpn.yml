AWSTemplateFormatVersion: '2010-09-09'
Description: >
  BugRaid AI — Site-to-Site VPN (BugRaid side).
  Creates a Virtual Private Gateway + Customer Gateway + VPN Connection between
  BugRaid's VPC and the customer's IPsec firewall. Plus a DNS resolution layer
  (parameter-selectable between cheap Private Hosted Zone and Route 53 Resolver
  outbound endpoint) so melt-fetcher can resolve customer internal hostnames
  through the tunnel. Deploy one stack per customer.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Customer identity
        Parameters:
          - CustomerSlug
      - Label:
          default: Customer IPsec endpoint (from customer's network team)
        Parameters:
          - CustomerFirewallPublicIp
          - CustomerBgpAsn
          - CustomerCidr
          - UseStaticRoutes
      - Label:
          default: DNS resolution mode
        Parameters:
          - UseDnsResolver
      - Label:
          default: DNS — Private Hosted Zone mode (cheap, default)
        Parameters:
          - PrivateDnsZoneName
          - ToolHostname
          - ToolIpAddress
      - Label:
          default: DNS — Route 53 Resolver mode (only if UseDnsResolver=true)
        Parameters:
          - CustomerDnsServerIp
      - Label:
          default: BugRaid network
        Parameters:
          - BugRaidVpcId
          - BugRaidVpcCidr
          - BugRaidPrivateSubnetIds
          - BugRaidRouteTableIds
    ParameterLabels:
      CustomerSlug:
        default: Short customer slug
      CustomerFirewallPublicIp:
        default: Customer's IPsec endpoint public IP
      CustomerBgpAsn:
        default: Customer firewall BGP ASN (or any number if static routes)
      CustomerCidr:
        default: Customer network CIDR
      UseStaticRoutes:
        default: Use static routes instead of BGP?
      UseDnsResolver:
        default: Use Route 53 Resolver outbound endpoint? (false = cheap PHZ mode)
      PrivateDnsZoneName:
        default: Customer domain (e.g. wework.co.in)
      ToolHostname:
        default: Tool hostname (PHZ mode — e.g. grafana.wework.co.in)
      ToolIpAddress:
        default: Tool private IP (PHZ mode — e.g. 172.16.46.42)
      CustomerDnsServerIp:
        default: Customer internal DNS server IP (Resolver mode only)
      BugRaidVpcId:
        default: BugRaid VPC ID
      BugRaidVpcCidr:
        default: BugRaid VPC CIDR
      BugRaidPrivateSubnetIds:
        default: ≥2 BugRaid private subnet IDs
      BugRaidRouteTableIds:
        default: BugRaid route table IDs for VPN propagation

Parameters:
  CustomerSlug:
    Type: String
    Description: >
      Short, stable customer identifier. Lower-case, hyphenated.
      Examples: wework, qubehealth.
    AllowedPattern: '^[a-z][a-z0-9-]{1,30}$'
    ConstraintDescription: lower-case letters, digits, hyphens; 2–31 characters.

  CustomerFirewallPublicIp:
    Type: String
    Description: Public IPv4 of customer's IPsec endpoint.
    AllowedPattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$'

  CustomerBgpAsn:
    Type: Number
    Description: >
      Customer's BGP ASN. Use private range (64512-65534) unless they have a
      registered public ASN. If firewall doesn't support BGP, set
      UseStaticRoutes=true and any valid ASN here.
    MinValue: 1
    MaxValue: 4294967294
    Default: 65000

  CustomerCidr:
    Type: String
    Description: >
      Customer's internal CIDR (must NOT overlap with BugRaid CIDR).
    AllowedPattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}/(?:3[0-2]|[12]?[0-9])$'

  UseStaticRoutes:
    Type: String
    Description: >
      true if customer firewall doesn't support BGP. Default false (BGP).
    AllowedValues: ['false', 'true']
    Default: 'false'

  UseDnsResolver:
    Type: String
    Description: >
      false (default) = cheap Private Hosted Zone mode. BugRaid creates a
      private DNS zone with A records you provide (ToolHostname → ToolIpAddress).
      Saves ~$180/mo per customer. Use this if tool IPs are STABLE.

      true = Route 53 Resolver outbound endpoint mode. Forwards DNS queries
      to customer's internal DNS server through the tunnel. ~$182/mo extra.
      Use this if tool hostnames are CNAMEs to AWS LB DNS (dynamic IPs).
    AllowedValues: ['false', 'true']
    Default: 'false'

  PrivateDnsZoneName:
    Type: String
    Description: >
      Customer's DNS domain (e.g. wework.co.in). Used in BOTH modes:
      PHZ mode creates a private zone with this name; Resolver mode forwards
      *.<this domain> queries to the customer's DNS server.
    AllowedPattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$'

  ToolHostname:
    Type: String
    Description: >
      [PHZ mode only — ignored when UseDnsResolver=true] Full hostname of
      the customer tool, e.g. grafana.wework.co.in.
      To onboard more tools later, add additional A records to the same
      PHZ via console or stack update.
    Default: ''

  ToolIpAddress:
    Type: String
    Description: >
      [PHZ mode only — ignored when UseDnsResolver=true] Private IP the
      tool's hostname should resolve to inside BugRaid VPC. Reachable via
      the VPN tunnel.
    Default: ''

  CustomerDnsServerIp:
    Type: String
    Description: >
      [Resolver mode only — ignored when UseDnsResolver=false] Customer's
      internal DNS server IP, reachable through the VPN tunnel.
    Default: ''

  BugRaidVpcId:
    Type: AWS::EC2::VPC::Id
    Description: BugRaid VPC where the VGW attaches.

  BugRaidVpcCidr:
    Type: String
    Description: BugRaid VPC CIDR (advertised to customer via BGP).
    Default: '10.250.0.0/16'
    AllowedPattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}/(?:3[0-2]|[12]?[0-9])$'

  BugRaidPrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: ≥2 BugRaid private subnets in different AZs (used by Resolver if enabled).

  BugRaidRouteTableIds:
    Type: CommaDelimitedList
    Description: Route table IDs that should learn customer CIDR via VPN propagation.

Conditions:
  IsBgp: !Equals [!Ref UseStaticRoutes, 'false']
  IsStatic: !Equals [!Ref UseStaticRoutes, 'true']
  UsePhz: !Equals [!Ref UseDnsResolver, 'false']
  UseResolver: !Equals [!Ref UseDnsResolver, 'true']
  HasTool: !And
    - !Condition UsePhz
    - !Not [!Equals [!Ref ToolHostname, '']]
    - !Not [!Equals [!Ref ToolIpAddress, '']]

Resources:

  # ---------------------------------------------------------------------------
  # VPN core resources (always created, both modes)
  # ---------------------------------------------------------------------------

  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      Type: ipsec.1
      IpAddress: !Ref CustomerFirewallPublicIp
      BgpAsn: !Ref CustomerBgpAsn
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-cgw'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug
        - Key: Pattern
          Value: s2s-vpn

  VpnGateway:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-vgw'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  VpnGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref BugRaidVpcId
      VpnGatewayId: !Ref VpnGateway

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    DependsOn: VpnGatewayAttachment
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref CustomerGateway
      VpnGatewayId: !Ref VpnGateway
      StaticRoutesOnly: !If [IsStatic, true, false]
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-vpn'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  CustomerStaticRoute:
    Type: AWS::EC2::VPNConnectionRoute
    Condition: IsStatic
    Properties:
      DestinationCidrBlock: !Ref CustomerCidr
      VpnConnectionId: !Ref VpnConnection

  VpnRoutePropagation:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VpnGatewayAttachment
    Properties:
      RouteTableIds: !Ref BugRaidRouteTableIds
      VpnGatewayId: !Ref VpnGateway

  # ---------------------------------------------------------------------------
  # DNS resolution — MODE A: Private Hosted Zone (cheap, default)
  # ---------------------------------------------------------------------------
  # Cost: ~$0.50/mo flat per zone. Best when tool hostnames resolve to stable
  # private IPs (e.g. NLB ENIs, EC2 primary IPs). Manual A record per tool.
  # To add a 2nd / 3rd tool, either run another `AWS::Route53::RecordSet` via
  # stack update, or use the AWS console.

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Condition: UsePhz
    Properties:
      Name: !Ref PrivateDnsZoneName
      HostedZoneConfig:
        Comment: !Sub 'bugraid-private-connect — ${CustomerSlug} S2S VPN'
      VPCs:
        - VPCId: !Ref BugRaidVpcId
          VPCRegion: !Ref AWS::Region
      HostedZoneTags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-phz'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  ToolARecord:
    Type: AWS::Route53::RecordSet
    Condition: HasTool
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Ref ToolHostname
      Type: A
      TTL: '300'
      ResourceRecords:
        - !Ref ToolIpAddress

  # ---------------------------------------------------------------------------
  # DNS resolution — MODE B: Route 53 Resolver outbound endpoint
  # ---------------------------------------------------------------------------
  # Cost: ~$182/mo per customer (2 ENIs × $0.125/hr). Best when tool hostnames
  # are CNAMEs to AWS LB DNS (dynamic IPs), OR when customer has 5+ tools to
  # auto-resolve.

  ResolverEndpointSg:
    Type: AWS::EC2::SecurityGroup
    Condition: UseResolver
    Properties:
      GroupName: !Sub 'bugraid-${CustomerSlug}-resolver-sg'
      GroupDescription: !Sub 'Outbound DNS for ${CustomerSlug} via S2S VPN'
      VpcId: !Ref BugRaidVpcId
      SecurityGroupEgress:
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: !Sub '${CustomerDnsServerIp}/32'
          Description: 'DNS queries to customer DNS server (UDP)'
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: !Sub '${CustomerDnsServerIp}/32'
          Description: 'DNS queries to customer DNS server (TCP, large responses)'
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: !Ref BugRaidVpcCidr
          Description: 'DNS queries from BugRaid VPC'
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: !Ref BugRaidVpcCidr
          Description: 'DNS queries (TCP) from BugRaid VPC'
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-resolver-sg'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  ResolverOutboundEndpoint:
    Type: AWS::Route53Resolver::ResolverEndpoint
    Condition: UseResolver
    Properties:
      Name: !Sub 'bugraid-${CustomerSlug}-outbound'
      Direction: OUTBOUND
      SecurityGroupIds:
        - !Ref ResolverEndpointSg
      IpAddresses:
        - SubnetId: !Select [0, !Ref BugRaidPrivateSubnetIds]
        - SubnetId: !Select [1, !Ref BugRaidPrivateSubnetIds]
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-outbound'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  ResolverRule:
    Type: AWS::Route53Resolver::ResolverRule
    Condition: UseResolver
    Properties:
      Name: !Sub 'bugraid-${CustomerSlug}-forward-rule'
      DomainName: !Ref PrivateDnsZoneName
      RuleType: FORWARD
      ResolverEndpointId: !Ref ResolverOutboundEndpoint
      TargetIps:
        - Ip: !Ref CustomerDnsServerIp
          Port: 53
      Tags:
        - Key: Name
          Value: !Sub 'bugraid-${CustomerSlug}-forward-rule'
        - Key: ManagedBy
          Value: bugraid-private-connect
        - Key: Customer
          Value: !Ref CustomerSlug

  ResolverRuleAssociation:
    Type: AWS::Route53Resolver::ResolverRuleAssociation
    Condition: UseResolver
    Properties:
      Name: !Sub 'bugraid-${CustomerSlug}-rule-attach'
      ResolverRuleId: !Ref ResolverRule
      VPCId: !Ref BugRaidVpcId

Outputs:
  VpnConnectionId:
    Description: VPN Connection ID. Used to download the IPsec config file for the customer's firewall vendor.
    Value: !Ref VpnConnection
    Export:
      Name: !Sub '${AWS::StackName}-VpnConnectionId'

  VpnGatewayId:
    Description: Virtual Private Gateway ID.
    Value: !Ref VpnGateway

  CustomerGatewayId:
    Description: Customer Gateway ID.
    Value: !Ref CustomerGateway

  DnsMode:
    Description: Which DNS mode this stack deployed in.
    Value: !If [UsePhz, 'private-hosted-zone (cheap)', 'route53-resolver (resilient)']

  PrivateHostedZoneId:
    Description: Private Hosted Zone ID (PHZ mode only).
    Value: !If [UsePhz, !Ref PrivateHostedZone, 'N/A']
    Condition: UsePhz

  ResolverEndpointId:
    Description: Route 53 Resolver outbound endpoint ID (Resolver mode only).
    Value: !Ref ResolverOutboundEndpoint
    Condition: UseResolver

  ResolverRuleId:
    Description: Resolver forwarding rule ID (Resolver mode only).
    Value: !Ref ResolverRule
    Condition: UseResolver

  EstimatedMonthlyCost:
    Description: Estimated monthly cost for THIS customer (BugRaid side, AWS list price).
    Value: !If
      - UsePhz
      - 'VPN $36 + PHZ $0.50 + data transfer = ~$40/mo'
      - 'VPN $36 + Resolver 2 ENI $182 + data transfer = ~$220/mo'

  DownloadConfigCommand:
    Description: >
      CLI to download IPsec config for customer's firewall vendor.
      Replace --vpn-connection-device-type-id with actual vendor ID from:
      https://docs.aws.amazon.com/vpn/latest/s2svpn/customer-gateway-devices.html
    Value: !Sub >
      aws ec2 get-vpn-connection-device-sample-configuration
      --vpn-connection-id ${VpnConnection}
      --vpn-connection-device-type-id <vendor-id>
      --region ${AWS::Region}
      --output text

  Instructions:
    Description: Next steps.
    Value: !Sub >
      (1) Download IPsec config via DownloadConfigCommand using customer's
      firewall vendor ID. (2) Send config file to customer; they apply to
      their firewall + add inbound rule allowing ${BugRaidVpcCidr} on the
      tool's port. (3) Verify tunnels UP in console. (4) From melt-fetcher
      Fargate: nslookup ${ToolHostname} should resolve to the customer's
      private IP. (5) curl -v https://${ToolHostname} should complete TLS
      against the customer's existing cert.
